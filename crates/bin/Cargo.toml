[package]
name = "redns"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "redns"
path = "src/main.rs"

[dependencies]
redns-core = { path = "../core" }
redns-matchers = { path = "../plugins/matchers" }
redns-executables = { path = "../plugins/executables" }
clap = { version = "4", features = ["derive"] }
socket2 = "0.6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
serde = { version = "1", features = ["derive"] }
serde-saphyr = { version = "0.0", default-features = false }
serde_json = "1"
async-trait = "0.1"
hickory-proto = { version = "0.25", default-features = false, features = ["std"] }
rusqlite = { version = "0.38", features = ["bundled"] }
mediatype = "0.21.0"
mime_guess = "2.0.5"
maxminddb = "0.27.3"

[target.'cfg(unix)'.dependencies]
bc-mimalloc = { version = "0.1.48", features = ["v3"] }
